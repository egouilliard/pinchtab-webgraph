<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>pinchtab-webgraph UI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Phase-1 placeholder: a two-column shell (sidebar of hosts + a how-to form).
       Phase 5 replaces this whole body with the real two-pane SPA; the .sidebar /
       .content seam here is where that swap lands. No framework, no build step. -->
  <header>
    <h1>pinchtab-webgraph</h1>
    <span class="tag">offline UI</span>
  </header>
  <main>
    <aside class="sidebar">
      <h2>Hosts</h2>
      <ul id="hosts"><li class="muted">loading…</li></ul>
      <p class="muted" id="caches-dir"></p>
    </aside>
    <section class="content">
      <form id="howto-form">
        <label>Host <input id="host" type="text" placeholder="app.example.com" /></label>
        <label>Goal <input id="goal" type="text" placeholder="create role" /></label>
        <button type="submit">How-to</button>
      </form>
      <div id="results"><p class="muted">Pick a host, type a goal, and hit How-to.</p></div>

      <!-- Phase-2 placeholder credentials panel; Phase 5's SPA replaces this too. -->
      <section class="vault">
        <h2>Credentials vault</h2>
        <p class="muted vault-status" id="vault-status">checking keyring…</p>
        <ul id="creds"><li class="muted">loading…</li></ul>
        <form id="cred-form" autocomplete="off">
          <label>Host <input id="cred-host" type="text" placeholder="app.example.com" /></label>
          <label>Login URL <input id="cred-url" type="text" placeholder="https://app.example.com/login" /></label>
          <label>Username <input id="cred-username" type="text" placeholder="me@example.com" /></label>
          <label>Password <input id="cred-password" type="password" placeholder="stored in the OS keyring only" /></label>
          <details class="advanced">
            <summary>Advanced (optional selector overrides)</summary>
            <label>userField <input id="cred-userField" type="text" placeholder="input[name=email]" /></label>
            <label>passField <input id="cred-passField" type="text" placeholder="input[type=password]" /></label>
            <label>submit <input id="cred-submit" type="text" placeholder="button[type=submit]" /></label>
            <label>successUrl <input id="cred-successUrl" type="text" placeholder="/dashboard" /></label>
            <label>keyringService <input id="cred-keyringService" type="text" placeholder="pinchtab-webgraph" /></label>
          </details>
          <button type="submit">Save credential</button>
        </form>
        <p class="muted vault-msg" id="cred-msg"></p>
      </section>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
